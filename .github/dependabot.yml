version: 2
updates:
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(backend-deps)'
    groups:
      nestjs:
        patterns:
          - '@nestjs/*'
      typeorm:
        patterns:
          - 'typeorm'
          - 'pg'
      dev:
        dependency-type: development

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(frontend-deps)'
    groups:
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react*'
      tanstack:
        patterns:
          - '@tanstack/*'
      testing:
        patterns:
          - 'vitest'
          - '@vitest/*'
          - '@testing-library/*'
          - 'jsdom'
      dev:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: 'chore(ci)'

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: monthly
    commit-message:
      prefix: 'chore(docker)'

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: monthly
    commit-message:
      prefix: 'chore(docker)'
