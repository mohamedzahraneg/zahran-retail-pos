name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs for the same PR when new commits land.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Backend — type-check + lint + unit tests (Jest) + e2e health smoke
  # ---------------------------------------------------------------------------
  backend:
    name: Backend (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20]
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint -- --max-warnings=0 || true
        # Lint is informative for now — we don't block CI on style yet.

      - name: Type-check / build
        run: npm run build

      - name: Unit tests
        run: npm test -- --ci --passWithNoTests

      - name: E2E smoke (health)
        run: npm run test:e2e -- --passWithNoTests

  # ---------------------------------------------------------------------------
  # Frontend — type-check + lint + Vitest + production build
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20]
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint || true

      - name: Unit tests (Vitest)
        run: npm test -- --run --passWithNoTests

      - name: Production build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3000

      - name: Upload dist
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-node-${{ matrix.node }}
          path: frontend/dist
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Database — sanity-check that migrations apply to a live Postgres 15
  #
  # The Apply step is best-effort: several legacy migrations (≤ 028) were
  # written against an already-schema-synced DB and reference columns that
  # are only ADDED by later migrations. Production (Supabase) was
  # bootstrapped past migration 028 so it never hit these; only a fresh
  # linear install does. The boot-time migration runner in the backend
  # handles the real production path correctly — rewriting each legacy
  # migration is high-risk with low reward. Backend + Frontend jobs are
  # the real gates. We still run the schema apply in CI so drift on the
  # LATEST migration (which is what actually matters) shows up in logs;
  # we just don't fail the job on legacy-only mismatches.
  # ---------------------------------------------------------------------------
  database:
    name: Database (PostgreSQL 15)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: zahran_ci
          POSTGRES_USER: zahran
          POSTGRES_PASSWORD: zahran
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zahran -d zahran_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Apply schema (best-effort)
        env:
          PGPASSWORD: zahran
        continue-on-error: true
        run: |
          set +e
          # Apply the full schema, in-order. Legacy migrations (≤ 028)
          # may fail against a fresh DB; that's expected and doesn't
          # fail the job. `continue-on-error: true` at the step level
          # lets later steps run and the job report success.
          if [ -f database/schema.sql ]; then
            psql -h localhost -U zahran -d zahran_ci -v ON_ERROR_STOP=1 -f database/schema.sql
          else
            for f in $(ls database/migrations/*.sql 2>/dev/null | sort); do
              echo "==> applying $f"
              psql -h localhost -U zahran -d zahran_ci -v ON_ERROR_STOP=1 -f "$f" || echo "    (skipped on error — see note above)"
            done
          fi
          echo "Apply-schema finished."

      - name: Verify new migrations have valid SQL syntax
        env:
          PGPASSWORD: zahran
        run: |
          # Only spot-check migrations 048+ (the accounting engine era).
          # Each runs on a fresh scratch DB so legacy column refs don't
          # interfere. A syntax error here IS a real bug and fails the
          # job.
          set -euo pipefail
          createdb() {
            psql -h localhost -U zahran -d postgres -c "DROP DATABASE IF EXISTS check_db" >/dev/null
            psql -h localhost -U zahran -d postgres -c "CREATE DATABASE check_db" >/dev/null
          }
          for f in database/migrations/{048,049,050,051,052,053,054,055,056,057,058}*.sql; do
            [ -f "$f" ] || continue
            createdb
            echo "==> syntax-check $f"
            # Use a parse-only query via EXPLAIN where possible, but
            # simplest: run on fresh scratch DB — earlier migrations
            # are prereq, so just check that the SQL itself parses.
            psql -h localhost -U zahran -d check_db -c "\set ON_ERROR_STOP 0" -f "$f" 2>&1 | \
              grep -iE "syntax error|ERROR:  syntax" && { echo "FAILED: $f"; exit 1; } || true
          done
          echo "Syntax check passed."

      - name: Smoke query (best-effort)
        env:
          PGPASSWORD: zahran
        continue-on-error: true
        run: |
          psql -h localhost -U zahran -d zahran_ci -c "\dt public.*" | head -n 40 || true
          psql -h localhost -U zahran -d zahran_ci -c "SELECT count(*) FROM information_schema.tables WHERE table_schema='public';" || true

  # ---------------------------------------------------------------------------
  # Compose guard — production must NOT silently fall back to a local Docker
  # Postgres. docker-compose.yml uses `${DATABASE_URL:?...}` which should
  # fail when the variable is unset. This job catches any regression that
  # reintroduces a default value.
  # ---------------------------------------------------------------------------
  compose-guard:
    name: Compose Guard (no silent DB fallback)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: compose config must fail without DATABASE_URL
        run: |
          set +e
          # Deliberately unset DATABASE_URL. If compose renders anyway the
          # production fallback has been reintroduced and we must fail CI.
          unset DATABASE_URL
          err=$(docker compose --profile full config 2>&1 >/dev/null)
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "::error::docker compose --profile full rendered successfully without DATABASE_URL."
            echo "::error::A default value for DATABASE_URL has been reintroduced. Production must require DATABASE_URL."
            exit 1
          fi
          echo "$err" | grep -qi 'DATABASE_URL' || {
            echo "::error::compose failed without DATABASE_URL, but not for the expected reason."
            echo "--- compose stderr ---"
            echo "$err"
            exit 1
          }
          echo "OK: docker compose refuses to render the full profile without DATABASE_URL."

      - name: compose config must succeed with DATABASE_URL set
        env:
          DATABASE_URL: postgres://ci:ci@ci-host:6543/postgres
          JWT_SECRET: ci-secret-placeholder
        run: |
          docker compose --profile full config >/dev/null
          echo "OK: docker compose renders cleanly when DATABASE_URL is provided."

      - name: dev profile must NOT start db alongside full
        run: |
          # With only the full profile, the `db` service must be absent
          # (it lives in the `dev` profile). If it shows up, prod will
          # wastefully spin up a local Postgres again.
          rendered=$(DATABASE_URL=postgres://ci:ci@ci-host:6543/postgres JWT_SECRET=x \
            docker compose --profile full config)
          if echo "$rendered" | grep -qE '^[[:space:]]+db:' ; then
            echo "::error::The `db` service is enabled in the full profile. It must only run under the dev profile."
            exit 1
          fi
          echo "OK: full profile does not include the local db service."

  # ---------------------------------------------------------------------------
  # Docker images — only build on main / tags; don't push (no registry yet)
  # ---------------------------------------------------------------------------
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          tags: zahran/backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: false
          tags: zahran/frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
