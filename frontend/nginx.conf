server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Allow logo/QR image uploads (base64-encoded in settings JSON payloads).
  client_max_body_size 15m;

  # Gzip
  gzip on;
  gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;
  gzip_min_length 512;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # PWA: long cache for assets, no-cache for index/SW
  location ~* \.(?:js|css|woff2|svg|png|jpg|jpeg|webp|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
    try_files $uri =404;
  }

  location = /sw.js {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }
  location = /manifest.webmanifest {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  # Proxy API to backend container (same docker network)
  location /api/ {
    proxy_pass http://api:3000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
  }

  # Socket.IO (realtime gateway) — needs WebSocket upgrade headers.
  location /socket.io/ {
    proxy_pass http://api:3000/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_buffering off;
  }

  # SPA fallback — all other routes go to index.html
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }

  # Block dotfiles
  location ~ /\.(?!well-known) { deny all; }
}
